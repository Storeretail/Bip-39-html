<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Multi-Chain Wallet</title>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-card: #1e293b;
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --error: #ef4444;
        }
        body {
            font-family: system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }
        .container { max-width: 960px; margin: 0 auto; }
        h1 { color: var(--accent); }
        .card {
            background: var(--bg-card);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            height: 120px;
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-family: monospace;
        }
        button {
            padding: 12px 20px;
            margin-right: 10px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-primary { background: var(--accent); color: #0f172a; }
        .btn-secondary { background: #64748b; color: white; }
        .data-display {
            background: #0f172a;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #334155;
            word-break: break-all;
            font-family: monospace;
            margin: 8px 0;
        }
        #masterLogStream {
            background: #020617;
            padding: 15px;
            border-radius: 8px;
            height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.9rem;
        }
        .log-success { color: var(--success); }
        .log-error { color: var(--error); }
    </style>
</head>
<body>
<div class="container">
    <h1>Master Multi-Chain Wallet</h1>
    <p>TON + Ethereum + TRON</p>

    <div class="card">
        <h2>1. Seed Phrase</h2>
        <textarea id="walletSeedInput" placeholder="Click Generate or paste 12/24 word seed..."></textarea>
        <div style="margin-top: 12px;">
            <button id="runGenSeed" class="btn-primary">Generate 24-Word Seed</button>
            <button id="runLoadEcosystem" class="btn-secondary">Derive Addresses</button>
        </div>
    </div>

    <div class="card">
        <h2>2. Addresses</h2>
        <div id="tonOutV5NB" class="data-display">—</div>
        <div id="tonOutV5B" class="data-display">—</div>
        <div id="tonOutV4NB" class="data-display">—</div>
        <div id="ethAddressOut" class="data-display">—</div>
        <div id="tronAddressOut" class="data-display">—</div>
    </div>

    <div class="card">
        <h2>3. Live TON Balance</h2>
        <div id="telemetryBalance" style="font-size: 2rem; font-weight: bold; color: var(--accent);">0.0000 TON</div>
        <button id="runQueryNode" class="btn-primary" style="margin-top:10px;">Query Balance</button>
    </div>

    <div class="card">
        <h2>Log</h2>
        <div id="masterLogStream">Waiting for action...</div>
    </div>
</div>

<script type="module" src="./main.js"></script>
</body>
</html>
