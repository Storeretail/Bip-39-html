<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Multi-Chain Wallet</title>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-card: #1e293b;
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --error: #ef4444;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
            margin: 0;
            padding: 2rem;
            line-height: 1.5;
        }
        .container { max-width: 960px; margin: 0 auto; }
        h1 { margin-bottom: 0.2rem; }
        p.subtitle { color: var(--text-muted); margin-bottom: 2rem; }
        h2 { color: var(--accent); border-bottom: 1px solid #334155; padding-bottom: 0.5rem; margin-top: 2rem; }
        .card {
            background-color: var(--bg-card);
            border-radius: 12px;
            padding: 1.6rem;
            margin-bottom: 1.8rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-weight: 600; }
        textarea {
            width: 100%;
            background: #0f172a;
            border: 1px solid #334155;
            color: #fff;
            padding: 0.85rem;
            border-radius: 6px;
            font-family: monospace;
            resize: vertical;
            min-height: 120px;
        }
        .btn-group { display: flex; gap: 1rem; margin-top: 1rem; flex-wrap: wrap; }
        button {
            background-color: var(--accent);
            color: #0f172a;
            border: none;
            padding: 0.85rem 1.8rem;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-secondary { background-color: #64748b; }
        .data-display {
            background: #0f172a;
            padding: 1rem;
            border-radius: 6px;
            border: 1px solid #334155;
            word-break: break-all;
            font-family: monospace;
            margin-top: 0.5rem;
            position: relative;
        }
        .copy-btn {
            position: absolute;
            top: 8px; right: 8px;
            background: #334155;
            color: #fff;
            border: none;
            padding: 4px 10px;
            font-size: 0.8rem;
            border-radius: 4px;
            cursor: pointer;
        }
        .grid-addresses {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.2rem;
        }
        @media(min-width: 768px) { .grid-addresses { grid-template-columns: repeat(2, 1fr); } }
        #masterLogStream {
            background-color: #020617;
            border: 1px solid #334155;
            border-radius: 8px;
            height: 220px;
            overflow-y: auto;
            padding: 1rem;
            font-family: monospace;
            font-size: 0.85rem;
        }
        .log-entry { margin-bottom: 0.4rem; }
        .log-success { color: var(--success); }
        .log-error { color: var(--error); }
        .warning {
            background: #451a03;
            border-left: 4px solid #f59e0b;
            padding: 1rem;
            margin-bottom: 1.5rem;
            border-radius: 6px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Master Multi-Chain Wallet</h1>
    <p class="subtitle">TON • Ethereum • TRON</p>

    <div class="warning">
        ⚠️ <strong>Security Notice:</strong> This is a demo application for education and testing only. 
        Never use real seed phrases in browser demos.
    </div>

    <div class="card">
        <h2>1. Seed Phrase</h2>
        <div class="form-group">
            <label for="walletSeedInput">BIP-39 Mnemonic (12 or 24 words)</label>
            <textarea id="walletSeedInput" placeholder="Click Generate or paste your seed here..."></textarea>
        </div>
        <div class="btn-group">
            <button id="runGenSeed">Generate 24-Word Seed</button>
            <button id="runLoadEcosystem" class="btn-secondary">Derive All Addresses</button>
        </div>
    </div>
